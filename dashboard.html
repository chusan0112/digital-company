<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金库集团 - 监控大屏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-dark: #0a0e14;
            --bg-card: #131a26;
            --bg-card-hover: #1a2332;
            --text-primary: #e6edf3;
            --text-secondary: #7d8590;
            --accent-blue: #2f81f7;
            --accent-green: #3fb950;
            --accent-orange: #d29922;
            --accent-red: #f85149;
            --accent-purple: #a371f7;
            --accent-cyan: #56d4dd;
            --border-color: #21262d;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Fullscreen Dashboard */
        body.fullscreen {
            overflow: hidden;
        }
        
        /* Header */
        .header {
            background: linear-gradient(180deg, var(--bg-card) 0%, rgba(19,26,38,0.95) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .company-name {
            font-size: 14px;
            color: var(--text-secondary);
            padding-left: 20px;
            border-left: 1px solid var(--border-color);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        
        .clock {
            font-size: 20px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: var(--accent-cyan);
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--accent-green);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent-green); }
            50% { opacity: 0.5; box-shadow: 0 0 0px var(--accent-green); }
        }
        
        .last-update {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* Main */
        .main {
            padding: 20px 32px;
            max-width: 1920px;
            margin: 0 auto;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
        }
        
        .stat-card.green::before {
            background: linear-gradient(90deg, var(--accent-green), #2ea043);
        }
        
        .stat-card.orange::before {
            background: linear-gradient(90deg, var(--accent-orange), #c69026);
        }
        
        .stat-card.red::before {
            background: linear-gradient(90deg, var(--accent-red), #da3633);
        }
        
        .stat-card.purple::before {
            background: linear-gradient(90deg, var(--accent-purple), #8957e5);
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }
        
        .stat-value.blue { color: var(--accent-blue); }
        .stat-value.green { color: var(--accent-green); }
        .stat-value.orange { color: var(--accent-orange); }
        .stat-value.red { color: var(--accent-red); }
        .stat-value.purple { color: var(--accent-purple); }
        .stat-value.cyan { color: var(--accent-cyan); }
        
        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        
        .content-grid.three-col {
            grid-template-columns: 1fr 1fr 1fr;
        }
        
        .content-grid.two-col {
            grid-template-columns: 2fr 1fr;
        }
        
        /* Card */
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }
        
        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.2);
        }
        
        .card-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-body {
            padding: 0;
            max-height: 320px;
            overflow-y: auto;
        }
        
        /* Employee List */
        .employee-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .employee-item {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 14px;
            transition: background 0.2s;
        }
        
        .employee-item:hover {
            background: var(--bg-card-hover);
        }
        
        .employee-item:last-child {
            border-bottom: none;
        }
        
        .employee-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .avatar-blue { background: linear-gradient(135deg, #2f81f7, #1a4b8c); }
        .avatar-green { background: linear-gradient(135deg, #3fb950, #238636); }
        .avatar-orange { background: linear-gradient(135deg, #d29922, #9e6a03); }
        .avatar-purple { background: linear-gradient(135deg, #a371f7, #6e40c9); }
        .avatar-cyan { background: linear-gradient(135deg, #56d4dd, #2b8A9A); }
        
        .employee-info {
            flex: 1;
            min-width: 0;
        }
        
        .employee-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .employee-role {
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        .employee-status {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .status-working {
            background: rgba(47, 129, 247, 0.15);
            color: var(--accent-blue);
        }
        
        .status-idle {
            background: rgba(125, 133, 144, 0.15);
            color: var(--text-secondary);
        }
        
        .status-discussing {
            background: rgba(163, 113, 247, 0.15);
            color: var(--accent-purple);
        }
        
        .status-resting {
            background: rgba(210, 153, 34, 0.15);
            color: var(--accent-orange);
        }
        
        /* Project List */
        .project-item {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .project-item:last-child {
            border-bottom: none;
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .project-name {
            font-size: 14px;
            font-weight: 600;
        }
        
        .project-status {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .project-status.active {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
        }
        
        .project-status.completed {
            background: rgba(47, 129, 247, 0.15);
            color: var(--accent-blue);
        }
        
        .project-status.planning {
            background: rgba(210, 153, 34, 0.15);
            color: var(--accent-orange);
        }
        
        .project-progress {
            height: 6px;
            background: var(--bg-dark);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        
        .project-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        .project-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        /* Task List */
        .task-item {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .task-item:last-child {
            border-bottom: none;
        }
        
        .task-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .task-icon.pending {
            background: rgba(210, 153, 34, 0.15);
            color: var(--accent-orange);
        }
        
        .task-icon.running {
            background: rgba(47, 129, 247, 0.15);
            color: var(--accent-blue);
        }
        
        .task-icon.completed {
            background: rgba(63, 185, 80, 0.15);
            color: var(--accent-green);
        }
        
        .task-icon.failed {
            background: rgba(248, 81, 73, 0.15);
            color: var(--accent-red);
        }
        
        .task-info {
            flex: 1;
            min-width: 0;
        }
        
        .task-desc {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .task-meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        /* Activity */
        .activity-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .activity-item {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }
        
        .activity-item:last-child {
            border-bottom: none;
        }
        
        .activity-time {
            font-size: 11px;
            color: var(--text-secondary);
            min-width: 60px;
            flex-shrink: 0;
        }
        
        .activity-content {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
            flex: 1;
        }
        
        .activity-content strong {
            color: var(--accent-cyan);
            font-weight: 500;
        }
        
        /* Empty State */
        .empty-state {
            padding: 30px 20px;
            text-align: center;
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 10px;
            opacity: 0.5;
        }
        
        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }
        
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 2px;
        }
        
        /* Responsive */
        @media (max-width: 1400px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .content-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="logo">🦞 金库集团</div>
            <div class="company-name">数字公司监控大屏</div>
        </div>
        <div class="header-right">
            <div class="clock" id="clock">--:--:--</div>
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>实时连接</span>
            </div>
            <div class="last-update" id="lastUpdate">加载中...</div>
        </div>
    </header>
    
    <main class="main">
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">👥 员工总数</div>
                <div class="stat-value blue" id="totalEmployees">0</div>
            </div>
            <div class="stat-card green">
                <div class="stat-label">✅ 在线员工</div>
                <div class="stat-value green" id="onlineEmployees">0</div>
            </div>
            <div class="stat-card purple">
                <div class="stat-label">📁 项目总数</div>
                <div class="stat-value purple" id="totalProjects">0</div>
            </div>
            <div class="stat-card orange">
                <div class="stat-label">🚀 进行中项目</div>
                <div class="stat-value orange" id="activeProjects">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📋 任务总数</div>
                <div class="stat-value blue" id="totalTasks">0</div>
            </div>
            <div class="stat-card green">
                <div class="stat-label">💰 可用预算</div>
                <div class="stat-value green" id="budget">¥0</div>
            </div>
        </div>
        
        <!-- Content -->
        <div class="content-grid three-col">
            <!-- Employee List -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">👥 员工状态</div>
                    <div class="status-indicator">
                        <div class="status-dot"></div>
                    </div>
                </div>
                <div class="card-body">
                    <div class="employee-list" id="employeeList">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Project Board -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">📁 项目看板</div>
                    <span class="status-indicator" style="color: var(--text-secondary); font-size: 11px;">
                        <span id="projectCount">0</span> 个项目
                    </span>
                </div>
                <div class="card-body">
                    <div class="employee-list" id="projectList">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Task Board -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">📋 任务看板</div>
                    <span class="status-indicator" style="color: var(--text-secondary); font-size: 11px;">
                        <span id="taskCount">0</span> 个任务
                    </span>
                </div>
                <div class="card-body">
                    <div class="employee-list" id="taskList">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Activity -->
        <div class="content-grid two-col" style="margin-top: 20px;">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">⚡ 实时动态</div>
                </div>
                <div class="card-body">
                    <div class="activity-list" id="activityList">
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <div>暂无动态</div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Task Stats -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">📊 任务统计</div>
                </div>
                <div class="card-body">
                    <div style="padding: 20px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                            <div class="stat-card" style="padding: 14px;">
                                <div class="stat-label">⏳ 待处理</div>
                                <div class="stat-value orange" id="pendingTasks">0</div>
                            </div>
                            <div class="stat-card" style="padding: 14px;">
                                <div class="stat-label">🔄 进行中</div>
                                <div class="stat-value blue" id="runningTasks">0</div>
                            </div>
                            <div class="stat-card" style="padding: 14px;">
                                <div class="stat-label">✅ 已完成</div>
                                <div class="stat-value green" id="completedTasks">0</div>
                            </div>
                            <div class="stat-card" style="padding: 14px;">
                                <div class="stat-label">❌ 失败</div>
                                <div class="stat-value red" id="failedTasks">0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        // 全局状态
        let dashboardData = null;
        let eventSource = null;
        
        // DOM元素
        const elements = {
            clock: document.getElementById('clock'),
            lastUpdate: document.getElementById('lastUpdate'),
            totalEmployees: document.getElementById('totalEmployees'),
            onlineEmployees: document.getElementById('onlineEmployees'),
            totalProjects: document.getElementById('totalProjects'),
            activeProjects: document.getElementById('activeProjects'),
            totalTasks: document.getElementById('totalTasks'),
            budget: document.getElementById('budget'),
            employeeList: document.getElementById('employeeList'),
            projectList: document.getElementById('projectList'),
            taskList: document.getElementById('taskList'),
            activityList: document.getElementById('activityList'),
            projectCount: document.getElementById('projectCount'),
            taskCount: document.getElementById('taskCount'),
            pendingTasks: document.getElementById('pendingTasks'),
            runningTasks: document.getElementById('runningTasks'),
            completedTasks: document.getElementById('completedTasks'),
            failedTasks: document.getElementById('failedTasks')
        };
        
        // 项目数据（模拟）
        const projects = [
            { id: 1, name: 'OpenClaw插件开发', status: 'active', progress: 75, tasks: 8, completed: 6, lead: '金小码' },
            { id: 2, name: '飞书自动化集成', status: 'active', progress: 45, tasks: 12, completed: 5, lead: '金小运' },
            { id: 3, name: '数字公司监控系统', status: 'completed', progress: 100, tasks: 6, completed: 6, lead: '金小码' }
        ];
        
        // 任务数据（模拟）
        const tasks = [
            { id: 1, desc: '优化Dashboard性能', status: 'running', agent: '金小码', time: '10分钟前' },
            { id: 2, desc: '飞书消息同步功能', status: 'pending', agent: '金小运', time: '30分钟前' },
            { id: 3, desc: 'Agent自动化测试', status: 'completed', agent: '金小码', time: '1小时前' },
            { id: 4, desc: '财务报表生成', status: 'completed', agent: '金小财', time: '2小时前' },
            { id: 5, desc: '市场推广方案', status: 'pending', agent: '金小市', time: '3小时前' }
        ];
        
        // 活动记录
        let activities = [];
        
        // 时钟更新
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            elements.clock.textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        // 格式化时间
        function formatTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return '刚刚';
            if (diff < 3600) return `${Math.floor(diff / 60)}分钟前`;
            if (diff < 86400) return `${Math.floor(diff / 3600)}小时前`;
            return date.toLocaleDateString('zh-CN');
        }
        
        // 获取状态样式
        function getStatusClass(status) {
            const map = {
                'working': 'status-working',
                'idle': 'status-idle',
                'discussing': 'status-discussing',
                'resting': 'status-resting'
            };
            return map[status] || 'status-idle';
        }
        
        // 获取状态文本
        function getStatusText(status) {
            const map = {
                'working': '工作中',
                'idle': '空闲',
                'discussing': '讨论中',
                'resting': '休息中'
            };
            return map[status] || '未知';
        }
        
        // 获取头像样式
        function getAvatarClass(index) {
            const classes = ['avatar-blue', 'avatar-green', 'avatar-orange', 'avatar-purple', 'avatar-cyan'];
            return classes[index % classes.length];
        }
        
        // 渲染员工列表
        function renderEmployees(data) {
            if (!data || !data.employees || data.employees.length === 0) {
                elements.employeeList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <div>暂无员工数据</div>
                    </div>
                `;
                return;
            }
            
            const employees = data.employees;
            let html = '';
            
            employees.forEach((emp, index) => {
                const avatarChar = emp.name.charAt(1) || '?';
                html += `
                    <div class="employee-item">
                        <div class="employee-avatar ${getAvatarClass(index)}">${avatarChar}</div>
                        <div class="employee-info">
                            <div class="employee-name">${emp.name}</div>
                            <div class="employee-role">${emp.role}</div>
                        </div>
                        <div class="employee-status ${getStatusClass(emp.status)}">
                            ${getStatusText(emp.status)}
                        </div>
                    </div>
                `;
            });
            
            elements.employeeList.innerHTML = html;
        }
        
        // 渲染项目看板
        function renderProjects() {
            if (!projects || projects.length === 0) {
                elements.projectList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <div>暂无项目</div>
                    </div>
                `;
                return;
            }
            
            let html = '';
            projects.forEach(proj => {
                html += `
                    <div class="project-item">
                        <div class="project-header">
                            <div class="project-name">${proj.name}</div>
                            <div class="project-status ${proj.status}">${proj.status === 'active' ? '进行中' : proj.status === 'completed' ? '已完成' : '规划中'}</div>
                        </div>
                        <div class="project-progress">
                            <div class="project-progress-bar" style="width: ${proj.progress}%"></div>
                        </div>
                        <div class="project-meta">
                            <span>负责人: ${proj.lead}</span>
                            <span>${proj.completed}/${proj.tasks} 任务</span>
                        </div>
                    </div>
                `;
            });
            
            elements.projectList.innerHTML = html;
            elements.projectCount.textContent = projects.length;
        }
        
        // 渲染任务看板
        function renderTasks() {
            if (!tasks || tasks.length === 0) {
                elements.taskList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div>暂无任务</div>
                    </div>
                `;
                return;
            }
            
            let html = '';
            const icons = {
                'pending': '⏳',
                'running': '🔄',
                'completed': '✅',
                'failed': '❌'
            };
            
            tasks.forEach(task => {
                html += `
                    <div class="task-item">
                        <div class="task-icon ${task.status}">${icons[task.status]}</div>
                        <div class="task-info">
                            <div class="task-desc">${task.desc}</div>
                            <div class="task-meta">${task.agent} · ${task.time}</div>
                        </div>
                    </div>
                `;
            });
            
            elements.taskList.innerHTML = html;
            elements.taskCount.textContent = tasks.length;
            
            // 更新任务统计
            const taskStats = {
                pending: tasks.filter(t => t.status === 'pending').length,
                running: tasks.filter(t => t.status === 'running').length,
                completed: tasks.filter(t => t.status === 'completed').length,
                failed: tasks.filter(t => t.status === 'failed').length
            };
            
            elements.pendingTasks.textContent = taskStats.pending;
            elements.runningTasks.textContent = taskStats.running;
            elements.completedTasks.textContent = taskStats.completed;
            elements.failedTasks.textContent = taskStats.failed;
        }
        
        // 渲染统计数据
        function renderStats(data) {
            if (!data) return;
            
            const status = data.employees_by_status || {};
            const onlineCount = status.working + status.discussing;
            
            elements.totalEmployees.textContent = data.employees_count || 0;
            elements.onlineEmployees.textContent = onlineCount;
            
            const projects = data.projects || {};
            elements.totalProjects.textContent = projects.total || 0;
            elements.activeProjects.textContent = projects.active || 0;
            
            const tasks = data.tasks || {};
            elements.totalTasks.textContent = tasks.total || 0;
            
            const financial = data.financial || {};
            elements.budget.textContent = `¥${financial.balance || 0}`;
            
            if (data.last_update) {
                elements.lastUpdate.textContent = `更新: ${formatTime(data.last_update)}`;
            }
        }
        
        // 添加活动记录
        function addActivity(agentName, content) {
            const time = new Date().toLocaleTimeString('zh-CN');
            
            activities.unshift({
                time: time,
                agent: agentName,
                content: content
            });
            
            // 限制显示数量
            if (activities.length > 20) {
                activities.pop();
            }
            
            renderActivities();
        }
        
        // 渲染活动列表
        function renderActivities() {
            if (activities.length === 0) {
                elements.activityList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div>暂无动态</div>
                    </div>
                `;
                return;
            }
            
            let html = '';
            activities.forEach(act => {
                html += `
                    <div class="activity-item">
                        <div class="activity-time">${act.time}</div>
                        <div class="activity-content"><strong>${act.agent}</strong> ${act.content}</div>
                    </div>
                `;
            });
            
            elements.activityList.innerHTML = html;
        }
        
        // 获取数据
        async function fetchData() {
            try {
                const response = await fetch('/api/realtime/dashboard');
                const data = await response.json();
                dashboardData = data;
                
                renderStats(data);
                renderEmployees(data);
                
            } catch (error) {
                console.error('Fetch error:', error);
            }
        }
        
        // SSE连接
        function connectSSE() {
            if (eventSource) {
                eventSource.close();
            }
            
            eventSource = new EventSource('/api/realtime/stream');
            
            eventSource.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    
                    if (data.keepalive) return;
                    
                    // 更新统计数据
                    if (data.agents) {
                        const statusCounts = {
                            working: data.agents.filter(a => a.status === 'working').length,
                            idle: data.agents.filter(a => a.status === 'idle').length,
                            discussing: data.agents.filter(a => a.status === 'discussing').length,
                            resting: data.agents.filter(a => a.status === 'resting').length
                        };
                        
                        const onlineCount = statusCounts.working + statusCounts.discussing;
                        elements.onlineEmployees.textContent = onlineCount;
                    }
                    
                } catch (error) {
                    console.error('SSE parse error:', error);
                }
            };
            
            eventSource.onerror = () => {
                console.log('SSE disconnected, reconnecting...');
                setTimeout(connectSSE, 5000);
            };
        }
        
        // 初始化
        async function init() {
            updateClock();
            setInterval(updateClock, 1000);
            
            await fetchData();
            connectSSE();
            
            // 渲染看板
            renderProjects();
            renderTasks();
            
            // 添加一些模拟活动
            addActivity('系统', '监控大屏已启动');
            addActivity('金小码', '完成代码审查');
            addActivity('金小运', '更新任务状态');
            
            // 每30秒刷新一次完整数据
            setInterval(fetchData, 30000);
        }
        
        // 启动
        init();
    </script>
</body>
</html>
